apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "Melamori44Sql"
            - name: MYSQL_DATABASE
              value: "transportation"
          # readinessProbe — Kubernetes не направляє трафік поки mysqladmin ping не успішний
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mysqladmin ping -u root -pMelamori44Sql
            initialDelaySeconds: 20
            periodSeconds: 10
          # livenessProbe — якщо не відповідає — Kubernetes перезапускає под
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mysqladmin ping -u root -pMelamori44Sql
            initialDelaySeconds: 40
            periodSeconds: 20