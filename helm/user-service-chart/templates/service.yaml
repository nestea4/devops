apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-user-service-svc
  labels:
    app: user-service
spec:
  type: {{ .Values.service.type }}
  selector:
    app: user-service
    release: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}